[DEFAULT]
resource_dir = ~/project/barseq/resource

#
# STAGE PARAMETER DEFAULTS
# 

#arity = single
arity = parallel
instage = None
instage_modes = None
label = None
ext = None
# Intended to match filename minus extension. 
file_regex = MAX_Pos(\d*)_(\d*)_(\d*)

# include leading string in position id group(1)
position_regex = MAX_(Pos\d)_(\d*)_(\d*)
# Remove leading base (filename) from output
# Used to produce experiment-wide global output files. 
strip_base = False

template_mode = None
template_source = None
num_cycles = 99

[project]
project_id=BC001
project_leader=Anthony Zador
project_institution=CSHL

###################### General BARseq Processing Conventions #########################
[barseq]
#
# standard processing filename and directory name patterns
#
bcseq_regex = bcseq(.*)
geneseq_regex = geneseq(.*) 
hyb_regex = hyb(.*)
#hyb_regex = hybseq_(.*)
image_regex = MAX_Pos(\d*)_(\d*)_(\d*)

# image_pattern should match filename WITHOUT extension. 
# i.e. retain option of adjusting inbound and outbound file formats...
image_pattern = MAX_Pos{pos}_{col:03}_{row:03}$
image_ext = tif
image_types = geneseq,bcseq,hyb


######################  Microscope Parameters  ####################
[nikon_eclipse_ti2]
image_regex = xy(.*)z(.*)c(.*)
fov_pixels_x=3200
fov_pixels_y=3200
# in um
pixel_size=0.33
channel_shift=chshift20x-20220218.tsv
channel_profile=chprofile20x-50-30-20-40-20220218.tsv


###################### Experiment-Specific Definitions #########################

[experiment]
modes = geneseq,bcseq,hyb
microscope_profile=nikon_eclipse_ti2 
[geneseq]
channels=G,T,A,C,BF
[bcseq]
channels=G,T,A,C,BF
[hyb]
channels=GFP,YFP,TxRed,Cy5,DAPI,BF
#channels=GFP,YFP,TXR,CY5,DAPI,BF

[tile]
microscope_profile=nikon_eclipse_ti2
# proportion of overlap
# overlap=.15
# percentage
horizontal_overlap=0.23
vertical_overlap=0.23
[maxproj]
microscope_profile=nikon_eclipse_ti2
maxproj_regex=MAX_Pos(\d*)_(\d*)_(\d*).tif



###################### Tool Configuration #########################

#  Tool parameters may still be specific to this experiment, but are
#  only relevant to that tool.
[n2v]
conda_env = n2v
# channels need to be in order
bcseq_model_stem = n2v_seq_20220204_
# channels with models made, e.g. not DIC
bcseq_model_channels = G,T,A,C

geneseq_model_stem = n2v_seq_20220204_
geneseq_model_channels = G,T,A,C

hyb_model_stem = n2v_hyb_20230323
hyb_model_channels = GFP,YFP,TxRed,Cy5
#hyb_model_channels = GFP,YFP,TXR,CY5

do_min_subtraction = True

# how many sub_commands to run at once.
n_jobs = 8
# if program is multi-threaded
n_threads = 1

[cv2]
conda_env = barseq
radius=31
# how many sub_commands to run at once.
n_jobs = 8
# if program is multi-threaded
n_threads = 1

[ski]
conda_env = barseq
n_jobs = 8
n_threads = 1

[np]
conda_env = barseq
n_jobs = 8
n_threads = 1

[mist]
fiji_path=/Applications/Fiji.app
conda_env = fiji-mist
n_jobs = 8
n_threads = 1

[ashlar]
conda_env = ashlar
n_jobs = 8
n_threads = 1

flip_y = False
flip_x = True
# pattern=MAX_Pos1_{col:03}_{row:03}.tif

[bardensr]
conda_env = bardensr
n_jobs = 1
n_threads = 1

[cellpose]
conda_env = cellpose
n_jobs = 8
n_threads = 1

[pd]
# pandas-based processing
conda_env = barseq
n_jobs = 8
n_threads = 1

[py]
# vanilla Python-based processing. 
conda_env = barseq
n_jobs = 8
n_threads = 1


###################### Pipeline Stages #########################
#
# For tileset (single tile across multiple cycles)
#   
# template_mode [geneseq, hyb, bcseq]  which modality should be the fixed template to refer to? 
#    This allows us to point to another mode for reference.  
#
# template_source = [input|output]     which tree should the fixed template come from. 
# 	This allows looking at the input tree, or the current output tree.  
#

[denoise-geneseq]
script_base = denoise
tool = n2v
modes= geneseq
stagedir = denoised
instage = None
image_type = geneseq
output_dtype = uint16

[denoise-hyb]
script_base = denoise
tool = n2v
modes=hyb
stagedir = denoised
instage = None
image_type = hyb
output_dtype = uint16

[denoise-bcseq]
script_base = denoise
tool = n2v
modes=bcseq
stagedir = denoised
instage = None
image_type = bcseq
output_dtype = uint16

[denoise-dummy]
modes=geneseq,bcseq,hyb
stagedir = denoised

[background]
modes=geneseq,bcseq,hyb
script_base = background
tool= cv2
stagedir = background
output_dtype = uint16
instage = denoise-dummy
instage_modes = geneseq,bcseq,hyb
arity = parallel

[regchannels]
modes=geneseq,bcseq,hyb
script_base = regchannels
tool = ski
stagedir = regchannels
is_affine = False
instage = background
instage_modes = geneseq,bcseq,hyb
arity = parallel


[bleedthrough]
modes=geneseq,bcseq,hyb
script_base = bleedthrough
stagedir = bleedthrough
tool = np
instage = regchannels
instage_modes = geneseq,bcseq,hyb


[regcycle-geneseq]
# register all geneseq to 1st geneseq cycle
modes = geneseq
instage = bleedthrough
instage_modes = geneseq
stagedir = regcycle
# process all
num_cycles = 99
arity = parallel

# use first cycle as template.
template_mode = geneseq
template_source = bleedthrough   
script_base = regcycle
tool = ski

subsample_rate = 4
do_coarse = False
resize_factor = 2
block_size = 128
num_initial_channels=5
num_later_channels=4
num_channels = 4

[regcycle-hyb]
# register all hyb to 1st geneseq cycle
# use first cycle of other mode as template.
template_mode = geneseq
template_source = regcycle-geneseq   
modes = hyb
stagedir = regcycle
instage = bleedthrough
instage_modes = hyb
script_base = regcycle
tool = ski

subsample_rate = 4
do_coarse = False
resize_factor = 2
block_size = 128
num_initial_channels=5
num_later_channels=4
num_channels = 4


[regcycle-bcseq-geneseq]
# register initial bcseq to 1st geneseq cycle
# use first cycle of other mode as template.
template_mode = geneseq	 
template_source = regcycle-geneseq
modes = bcseq
instage = bleedthrough
instage_modes = bcseq
stagedir = regcycle
num_cycles = 1
script_base = regcycle
tool = ski

subsample_rate = 4
do_coarse = False
resize_factor = 2
block_size = 128
num_initial_channels=5
num_later_channels=4
num_channels = 4


[regcycle-bcseq]
# register all bcseq to (new) 1st bcseq cycle
# requires correct definition of input/output dirs. 
modes = bcseq
instage = bleedthrough
instage_modes = bcseq
stagedir = regcycle
# process all
num_cycles = 99

# use first bcseq output cycle as template.
template_mode = bcseq
template_source = regcycle-bcseq	
script_base = regcycle
tool = ski

subsample_rate = 4
do_coarse = False
resize_factor = 2
block_size = 128
num_initial_channels=5
num_later_channels=4
num_channels = 4


[basecall-geneseq]
# process all tiles across geneseq cycles. 
image_type = geneseq
modes = geneseq
stagedir = basecall
instage = regcycle-geneseq
instage_modes = geneseq
arity = single
file_regex = MAX_Pos(\d*)_(\d*)_(\d*).bardensrresult 
label = bardensrresult
ext = csv
num_cycles = 99
script_base = basecall-geneseq
tool = bardensr

# base order determines binary mapping
# e.g. 8 4 2 1 
codebook_bases = G,T,A,C
codebook_file = codebook_geneseq.tsv
fdrthresh=0.05
trim=160
cropf=0.4
noisefloor_ini=0.01
noisefloor_final=0.05
# 0.5383558564715916  # from calc_bardensr_parameters. 
intensity_thresh=0.538355856


[basecall-hyb]
# single cycle, so go directly to global merge, 
# indexed by position
image_type = hyb
template_mode = None
template_source = input
modes = hyb
stagedir = merge
instage = regcycle-hyb
instage_modes = hyb
arity = single
label = genehyb
ext = joblib
file_regex = genehyb 
strip_base = True
num_cycles = 1
script_base = basecall-hyb
tool = ski
codebook_file = codebook_hyb.tsv
codebook_channels = 1,2,4
trim=160
cropf=0.4

num_c=4
thresh=[50,60,40,30]
prominence=[50,10,40,10]
all_genes_ch=2

relaxed=True
no_deconv=True
filter_overlap=0


[segment]
image_type = hyb
template_mode = None
template_source = input
modes = hyb, geneseq
stagedir = segment
instage = regcycle-hyb
instage_modes = hyb, geneseq
# assumes regcycle-hyb and regcycle-geneseq are in same input dir 
# i.e. regcycle directory
num_cycles = 99
script_base = segment
arity = single
# output will go to first mode (hyb)
tool = cellpose
label = cp_mask_cyto3
ext = tif
file_regex = MAX_Pos(\d*)_(\d*)_(\d*).cp_mask_cyto3 
model_name = cyto3
cell_diameter = 40


[stitch]
#
# stitch all positions for QC
modes= hyb
num_cycles = 1
# channels=1,2,3,4,5
channels=4
file_regex = MAX_Pos(\d*)_(\d*)_(\d*).tform_original
script_base = stitch
stagedir = stitch
tool = ashlar
output_dtype = uint16
instage = regcycle-geneseq
instage_modes = hyb
arity = single
# label = positions
# ext = tsv
strip_base = False
label = tform_original
ext = joblib


[merge-segment]
template_mode = None
template_source = None
modes = hyb
stagedir = merge
instage = segment
instage_modes = hyb
num_cycles = 1
script_base = merge-segment
tool = ski 
arity = single
file_regex = all_segmentation
label = all_segmentation
strip_base = True
ext = joblib

dilation_radius=3

[merge-basecall-geneseq]
# process all tiles across geneseq cycles. 
template_mode = None	 
template_source = None
modes = geneseq
num_cycles = 1
stagedir = merge
instage = basecall-geneseq
instage_modes = geneseq
arity = single
file_regex = basecalls
label = basecalls
ext = joblib
strip_base = True
script_base = merge-basecall-geneseq
tool = pd 


[merge-stitch]
# Collect stitched data 
template_mode = None	 
template_source = None
modes = hyb
stagedir = merge
instage = stitch
instage_modes = hyb
arity = single
file_regex = tforms_original
label = tforms_original
ext = joblib
strip_base = True
script_base = merge-stitch-ashlar
tool = pd

transform_rescale_factor=0.5
intensity_scaling=3
tilesize=3200
display_additional_rescale=0.2


[merge-dummy]
# pulls together all files (from multiple stages) 
# in the merge directory, for use by a single stage
template_mode = None	 
template_source = None
modes = hyb,geneseq
num_cycles = 1
stagedir = merge
instage = merge-segment
instage_modes = hyb,geneseq
arity = parallel
file_regex = all_segmentation, basecalls, cell_id,  genehyb, lroi10x, tforms_final, tforms_original, tforms_rescaled0p5   
label = all_segmentation
ext = joblib
strip_base = True
script_base = merge-dummy
tool = py


[aggregate-cellids]
# aggregate merged data further
# Pull all files from merge dir. 
template_mode = None	 
template_source = None
modes = hyb
stagedir = merge
instage = merge-dummy
instage_modes = hyb,geneseq
arity = single
file_regex = cell_id
label = cell_id
ext = joblib
strip_base = True
script_base = aggregate-cellids
tool = py

[aggregate-transform]
# aggregate per position
# 
template_mode = None	 
template_source = None
modes = hyb
stagedir = merge
instage = merge-dummy
instage_modes = hyb,geneseq
arity = single
file_regex = lroi10x
label = lroi10x
ext = joblib
strip_base = True
script_base = aggregate-transform
tool = np

[aggregate-data]
# aggregate per position
# 
template_mode = None	 
template_source = None
modes = hyb
stagedir = aggregated
instage = merge-dummy
instage_modes = hyb,geneseq
arity = single
file_regex = processeddata
label = processeddata
ext = joblib
strip_base = True
script_base = aggregate-data
tool = py

starting_slice_idx=1
starting_fov_idx=1
dummy_cell_num=10000
tilesize=3200
fraction_border=0.07


[filter-data]
# filter
template_mode = None	 
template_source = None
modes = hyb
stagedir = aggregated
instage = merge-dummy
instage_modes = hyb,geneseq
arity = single
file_regex = filt_neurons
label = processeddata
ext = joblib
strip_base = True
script_base = aggregate-data
tool = py
